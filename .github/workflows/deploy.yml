name: Deploy Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: loops-app-v1-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: opus-loops/loops-app-v1

jobs:
  detect_staging_changes:
    name: Detect staging changes
    runs-on: ubuntu-latest
    outputs:
      build_image_ref: ${{ steps.changes.outputs.build_image_ref }}
      deploy_image_ref: ${{ steps.changes.outputs.deploy_image_ref }}
      should_build_image: ${{ steps.changes.outputs.should_build_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR for image lookup
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect image and deployment-only changes
        id: changes
        run: |
          set -euo pipefail

          build_image_ref="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          deploy_image_ref="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging"
          should_build_image=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            should_build_image=true
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"

            if [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
              mapfile -t changed_files < <(git ls-tree -r --name-only "$head_sha")
            else
              mapfile -t changed_files < <(git diff --name-only "$base_sha" "$head_sha")
            fi

            for file in "${changed_files[@]}"; do
              if [ -z "$file" ]; then
                continue
              fi

              case "$file" in
                .github/workflows/deploy.yml|scripts/deploy-staging.sh|stack.staging.yml)
                  ;;
                *)
                  should_build_image=true
                  break
                  ;;
              esac
            done
          fi

          if [ "$should_build_image" = "false" ] && ! docker manifest inspect "$deploy_image_ref" >/dev/null 2>&1; then
            should_build_image=true
            deploy_image_ref="$build_image_ref"
          fi

          if [ "$should_build_image" = "true" ]; then
            deploy_image_ref="$build_image_ref"
          fi

          echo "build_image_ref=$build_image_ref" >> "$GITHUB_OUTPUT"
          echo "deploy_image_ref=$deploy_image_ref" >> "$GITHUB_OUTPUT"
          echo "should_build_image=$should_build_image" >> "$GITHUB_OUTPUT"

  build_staging_image:
    name: Build and push staging image
    runs-on: ubuntu-latest
    needs: detect_staging_changes
    if: ${{ needs.detect_staging_changes.outputs.should_build_image == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write staging env file for Docker build
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.STAGING_ENV_VARS }}" > .staging.env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          secret-files: |
            app_env=.staging.env
          tags: |
            ${{ needs.detect_staging_changes.outputs.build_image_ref }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

  deploy_staging:
    name: Deploy staging changes
    runs-on: ubuntu-latest
    needs:
      - detect_staging_changes
      - build_staging_image
    if: ${{ always() && needs.detect_staging_changes.result == 'success' && (needs.build_staging_image.result == 'success' || needs.build_staging_image.result == 'skipped') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare remote staging directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_VM_HOST }}
          username: ${{ secrets.STAGING_VM_USER }}
          key: ${{ secrets.STAGING_VM_PRIVATE_KEY }}
          script_stop: true
          script: |
            mkdir -p "$HOME/loops-app-staging"

      - name: Copy staging stack file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_VM_HOST }}
          username: ${{ secrets.STAGING_VM_USER }}
          key: ${{ secrets.STAGING_VM_PRIVATE_KEY }}
          source: "stack.staging.yml"
          target: "~/loops-app-staging"
          overwrite: true

      - name: Copy staging deploy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_VM_HOST }}
          username: ${{ secrets.STAGING_VM_USER }}
          key: ${{ secrets.STAGING_VM_PRIVATE_KEY }}
          source: "scripts/deploy-staging.sh"
          target: "~/loops-app-staging"
          strip_components: 1
          overwrite: true

      - name: Verify staging deployment files on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_VM_HOST }}
          username: ${{ secrets.STAGING_VM_USER }}
          key: ${{ secrets.STAGING_VM_PRIVATE_KEY }}
          script_stop: true
          script: |
            test -f "$HOME/loops-app-staging/stack.staging.yml"
            test -f "$HOME/loops-app-staging/deploy-staging.sh"

      - name: Run staging deployment
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_IMAGE: ${{ needs.detect_staging_changes.outputs.deploy_image_ref }}
          ENV_VARS: ${{ secrets.STAGING_ENV_VARS }}
          GHCR_ACCESS_TOKEN: ${{ secrets.GHCR_ACCESS_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          STACK_NAME: loops-app-staging
        with:
          host: ${{ secrets.STAGING_VM_HOST }}
          username: ${{ secrets.STAGING_VM_USER }}
          key: ${{ secrets.STAGING_VM_PRIVATE_KEY }}
          envs: APP_IMAGE,ENV_VARS,GHCR_ACCESS_TOKEN,GHCR_USERNAME,STACK_NAME
          script_stop: true
          script: |
            DEPLOY_DIR="$HOME/loops-app-staging"
            chmod +x "$DEPLOY_DIR/deploy-staging.sh"
            DEPLOY_DIR="$DEPLOY_DIR" sudo --preserve-env=DEPLOY_DIR,APP_IMAGE,ENV_VARS,GHCR_ACCESS_TOKEN,GHCR_USERNAME,STACK_NAME "$DEPLOY_DIR/deploy-staging.sh"
